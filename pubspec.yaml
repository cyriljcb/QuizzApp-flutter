name: quiz
description: Application quiz multijoueur inspirée de "100% Logique"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # SignalR
  signalr_netcore: ^1.3.4

  # Gestion d'état
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # UI
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0      # animations fluides (timer, transitions)
  cached_network_image: ^3.3.1  # images des questions

  # HTTP (pour les endpoints REST)
  http: ^1.2.1

  #qr code
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11

flutter:
  uses-material-design: true